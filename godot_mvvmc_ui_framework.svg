  <rect x="160" y="118" width="175" height="66" rx="6" fill="#E8F2FF" stroke="#84B0DC" stroke-width="1.2"/>
  <text x="247" y="139" text-anchor="middle" fill="#2B5090" font-size="11" font-weight="bold">package.json</text>
  <text x="247" y="155" text-anchor="middle" fill="#5A7AAA" font-size="10">packageId / paths</text>
  <text x="247" y="170" text-anchor="middle" fill="#5A7AAA" font-size="10">Godot addon 配置</text>
  <rect x="350" y="118" width="175" height="66" rx="6" fill="#E8F2FF" stroke="#84B0DC" stroke-width="1.2"/>
  <text x="437" y="139" text-anchor="middle" fill="#2B5090" font-size="11" font-weight="bold">layout.json</text>
  <text x="437" y="155" text-anchor="middle" fill="#5A7AAA" font-size="10">Control 节点树</text>
  <text x="437" y="170" text-anchor="middle" fill="#5A7AAA" font-size="10">Label / Button / List</text>
  <rect x="540" y="118" width="175" height="66" rx="6" fill="#E8F2FF" stroke="#84B0DC" stroke-width="1.2"/>
  <text x="627" y="139" text-anchor="middle" fill="#2B5090" font-size="11" font-weight="bold">bindings.json</text>
  <text x="627" y="155" text-anchor="middle" fill="#5A7AAA" font-size="10">fieldId / target</text>
  <text x="627" y="170" text-anchor="middle" fill="#5A7AAA" font-size="10">signal -> handler</text>
  <rect x="730" y="118" width="175" height="66" rx="6" fill="#E8F2FF" stroke="#84B0DC" stroke-width="1.2"/>
  <text x="817" y="139" text-anchor="middle" fill="#2B5090" font-size="11" font-weight="bold">assets.json</text>
  <text x="817" y="155" text-anchor="middle" fill="#5A7AAA" font-size="10">Texture / Font / Theme</text>
