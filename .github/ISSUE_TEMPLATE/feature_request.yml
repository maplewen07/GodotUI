name: Feature request
description: Propose a focused Manifest UI capability or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the workflow or limitation this request addresses.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the desired manifest, runtime, editor, or CLI behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Explain current workarounds and relevant tradeoffs.

  - type: dropdown
    id: compatibility
    attributes:
      label: Compatibility impact
      options:
        - Additive and schema v1 compatible
        - Requires a migration
        - Unsure
    validations:
      required: true
