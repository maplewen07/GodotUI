name: Bug report
description: Report a reproducible Manifest UI defect.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: >-
        Do not disclose security vulnerabilities here. Follow SECURITY.md and
        use private vulnerability reporting instead.

  - type: input
    id: manifest_ui_version
    attributes:
      label: Manifest UI version
      description: Release version, tag, or commit SHA.
      placeholder: 0.1.0-alpha.1
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Godot Mono version, .NET SDK version, and operating system.
      placeholder: Godot 4.7 Mono, .NET SDK 8.0.400, Windows 11
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide exact steps and the smallest relevant manifest or project.
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics and logs
      description: Include issue codes, CLI output, and Godot errors with secrets removed.
      render: text

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I reproduced this with Godot 4.7 Mono.
          required: true
        - label: I searched existing issues for the same behavior.
          required: true
