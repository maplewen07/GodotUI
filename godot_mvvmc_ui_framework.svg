<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.14"/></filter>
    <filter id="softShadow"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.09"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#AACCFF"/>
    </marker>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A3060"/>
      <stop offset="100%" style="stop-color:#3A60A0"/>
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E6A3A"/>
      <stop offset="100%" style="stop-color:#3A9A3A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="760" fill="#F0F3F8"/>

  <rect x="0" y="0" width="1200" height="64" fill="url(#titleGradient)"/>
  <text x="600" y="31" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="bold">Godot MVVM-C UI Framework</text>
  <text x="600" y="49" text-anchor="middle" fill="#AACCFF" font-size="12">Manifest 驱动生成 · Godot Control 场景 · Runtime 唯一入口闭环</text>

  <text x="24" y="128" fill="#4A5A70" font-size="12" font-weight="bold">数据源</text>
  <text x="24" y="268" fill="#4A5A70" font-size="12" font-weight="bold">编辑器管线</text>
  <text x="24" y="435" fill="#4A5A70" font-size="12" font-weight="bold">运行时核心</text>
  <text x="24" y="594" fill="#4A5A70" font-size="12" font-weight="bold">Godot 产物</text>
  <line x1="118" y1="82" x2="118" y2="720" stroke="#CBD2DD" stroke-width="1" stroke-dasharray="5,4"/>

  <rect x="140" y="84" width="1020" height="122" rx="10" fill="#FFFFFF" stroke="#5B8DD9" stroke-width="1.5" filter="url(#shadow)"/>
