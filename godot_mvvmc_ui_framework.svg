  <text x="1030" y="139" text-anchor="middle" fill="#2B5090" font-size="11" font-weight="bold">codegen.json / strings.json</text>
  <text x="1030" y="155" text-anchor="middle" fill="#5A7AAA" font-size="10">脚本命名 / 输出目录</text>
  <text x="1030" y="170" text-anchor="middle" fill="#5A7AAA" font-size="10">中英文文案源数据</text>
  <line x1="650" y1="206" x2="650" y2="224" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="140" y="224" width="1020" height="122" rx="10" fill="#FFFFFF" stroke="#9B6DC8" stroke-width="1.5" filter="url(#shadow)"/>
