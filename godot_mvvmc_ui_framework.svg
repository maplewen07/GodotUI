  <text x="235" y="279" text-anchor="middle" fill="#4A2070" font-size="11" font-weight="bold">LoadManifest</text>
  <text x="235" y="296" text-anchor="middle" fill="#7A4AAA" font-size="10">读取 Source</text>
  <rect x="328" y="259" width="150" height="61" rx="6" fill="#F0E8FC" stroke="#C090D8" stroke-width="1.2"/>
  <text x="403" y="279" text-anchor="middle" fill="#4A2070" font-size="11" font-weight="bold">Validate</text>
  <text x="403" y="296" text-anchor="middle" fill="#7A4AAA" font-size="10">路径 / 字段 / signal</text>
  <rect x="496" y="259" width="150" height="61" rx="6" fill="#F0E8FC" stroke="#C090D8" stroke-width="1.2"/>
  <text x="571" y="279" text-anchor="middle" fill="#4A2070" font-size="11" font-weight="bold">ImportResource</text>
  <text x="571" y="296" text-anchor="middle" fill="#7A4AAA" font-size="10">生成资源索引</text>
  <rect x="664" y="259" width="150" height="61" rx="6" fill="#F0E8FC" stroke="#C090D8" stroke-width="1.2"/>
  <text x="739" y="279" text-anchor="middle" fill="#4A2070" font-size="11" font-weight="bold">GenerateScene</text>
  <text x="739" y="296" text-anchor="middle" fill="#7A4AAA" font-size="10">写 .tscn Control</text>
  <rect x="832" y="259" width="150" height="61" rx="6" fill="#F0E8FC" stroke="#C090D8" stroke-width="1.2"/>
  <text x="907" y="279" text-anchor="middle" fill="#4A2070" font-size="11" font-weight="bold">GenerateScript</text>
  <text x="907" y="296" text-anchor="middle" fill="#7A4AAA" font-size="10">View / Controller</text>
  <rect x="1000" y="259" width="140" height="61" rx="6" fill="#F0E8FC" stroke="#C090D8" stroke-width="1.2"/>
  <text x="1070" y="279" text-anchor="middle" fill="#4A2070" font-size="11" font-weight="bold">VerifyReport</text>
  <text x="1070" y="296" text-anchor="middle" fill="#7A4AAA" font-size="10">可重建验证</text>
  <path d="M310 289 L328 289" stroke="#7A4AAA" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M478 289 L496 289" stroke="#7A4AAA" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M646 289 L664 289" stroke="#7A4AAA" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M814 289 L832 289" stroke="#7A4AAA" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M982 289 L1000 289" stroke="#7A4AAA" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="650" y1="346" x2="650" y2="368" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="140" y="368" width="1020" height="152" rx="10" fill="#2D3E56" filter="url(#shadow)"/>
  <text x="650" y="389" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">Runtime MVVM-C Core：一次事件或一次状态推进只走一条链</text>
  <text x="650" y="406" text-anchor="middle" fill="#AACCFF" font-size="10">External System / MessageBus -> UIManager -> Controller -> Store -> Binder -> Control</text>
  <rect x="162" y="425" width="170" height="64" rx="6" fill="#FFFFFF" opacity="0.12"/>
  <text x="247" y="447" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold">UIManager</text>
  <text x="247" y="464" text-anchor="middle" fill="#AACCFF" font-size="10">唯一 Open / Close</text>
  <text x="247" y="479" text-anchor="middle" fill="#AACCFF" font-size="10">load PackedScene</text>
  <rect x="365" y="425" width="170" height="64" rx="6" fill="#FFFFFF" opacity="0.12"/>
  <text x="450" y="447" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold">Controller</text>
  <text x="450" y="464" text-anchor="middle" fill="#AACCFF" font-size="10">唯一业务入口</text>
  <text x="450" y="479" text-anchor="middle" fill="#AACCFF" font-size="10">拥有 Store / Binder</text>
  <rect x="568" y="425" width="170" height="64" rx="6" fill="#FFFFFF" opacity="0.12"/>
  <text x="653" y="447" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold">ViewModelStore</text>
  <text x="653" y="464" text-anchor="middle" fill="#AACCFF" font-size="10">显示状态唯一来源</text>
  <text x="653" y="479" text-anchor="middle" fill="#AACCFF" font-size="10">DirtyFields</text>
  <rect x="771" y="425" width="170" height="64" rx="6" fill="#FFFFFF" opacity="0.12"/>
  <text x="856" y="447" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold">Binder</text>
  <text x="856" y="464" text-anchor="middle" fill="#AACCFF" font-size="10">唯一 UI 刷新入口</text>
  <text x="856" y="479" text-anchor="middle" fill="#AACCFF" font-size="10">Flush 后写 Control</text>
  <rect x="974" y="425" width="150" height="64" rx="6" fill="#FFFFFF" opacity="0.12"/>
  <text x="1049" y="447" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold">Platform Services</text>
  <text x="1049" y="464" text-anchor="middle" fill="#AACCFF" font-size="10">MessageBus</text>
  <text x="1049" y="479" text-anchor="middle" fill="#AACCFF" font-size="10">Localization / LayerStack</text>
  <path d="M332 457 L365 457" stroke="#AACCFF" stroke-width="1.7" marker-end="url(#arrowWhite)"/>
  <path d="M535 457 L568 457" stroke="#AACCFF" stroke-width="1.7" marker-end="url(#arrowWhite)"/>
  <path d="M738 457 L771 457" stroke="#AACCFF" stroke-width="1.7" marker-end="url(#arrowWhite)"/>
  <path d="M941 457 L974 457" stroke="#AACCFF" stroke-width="1.7" marker-end="url(#arrowWhite)"/>
  <line x1="650" y1="520" x2="650" y2="538" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="140" y="538" width="1020" height="112" rx="10" fill="#FFFFFF" stroke="#3A9A3A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="650" y="558" text-anchor="middle" fill="#1A5A1A" font-size="13" font-weight="bold">Generated Godot Output：可删除重建，运行时不反读 Source JSON</text>
  <rect x="160" y="574" width="172" height="48" rx="5" fill="#E8F8E8" stroke="#80C880" stroke-width="1"/>
  <text x="246" y="593" text-anchor="middle" fill="#1A5A1A" font-size="11" font-weight="bold">.tscn Control Scene</text>
  <text x="246" y="609" text-anchor="middle" fill="#5A9A5A" font-size="10">Panel -> Control</text>
  <rect x="352" y="574" width="172" height="48" rx="5" fill="#E8F8E8" stroke="#80C880" stroke-width="1"/>
  <text x="438" y="593" text-anchor="middle" fill="#1A5A1A" font-size="11" font-weight="bold">View Generated Script</text>
  <text x="438" y="609" text-anchor="middle" fill="#5A9A5A" font-size="10">signal 只转发</text>
  <rect x="544" y="574" width="172" height="48" rx="5" fill="#E8F8E8" stroke="#80C880" stroke-width="1"/>
  <text x="630" y="593" text-anchor="middle" fill="#1A5A1A" font-size="11" font-weight="bold">Controller Partial</text>
  <text x="630" y="609" text-anchor="middle" fill="#5A9A5A" font-size="10">手写业务逻辑</text>
  <rect x="736" y="574" width="172" height="48" rx="5" fill="#E8F8E8" stroke="#80C880" stroke-width="1"/>
  <text x="822" y="593" text-anchor="middle" fill="#1A5A1A" font-size="11" font-weight="bold">Theme / Resource</text>
  <text x="822" y="609" text-anchor="middle" fill="#5A9A5A" font-size="10">Texture / Font / StyleBox</text>
  <rect x="928" y="574" width="212" height="48" rx="5" fill="#E8F8E8" stroke="#80C880" stroke-width="1"/>
  <text x="1034" y="593" text-anchor="middle" fill="#1A5A1A" font-size="11" font-weight="bold">Common Controls</text>
  <text x="1034" y="609" text-anchor="middle" fill="#5A9A5A" font-size="10">Label / TextureRect / Button / List</text>

  <rect x="140" y="670" width="1020" height="58" rx="10" fill="url(#greenGradient)" filter="url(#shadow)"/>
  <text x="188" y="693" fill="#FFFFFF" font-size="13" font-weight="bold">运行时流程唯一性</text>
  <rect x="300" y="683" width="132" height="28" rx="14" fill="#FFFFFF" opacity="0.16"/>
  <text x="366" y="702" text-anchor="middle" fill="#E8FFE8" font-size="10">Control 不写 Store</text>
  <rect x="448" y="683" width="142" height="28" rx="14" fill="#FFFFFF" opacity="0.16"/>
  <text x="519" y="702" text-anchor="middle" fill="#E8FFE8" font-size="10">Binder 不调 Controller</text>
  <rect x="606" y="683" width="150" height="28" rx="14" fill="#FFFFFF" opacity="0.16"/>
  <text x="681" y="702" text-anchor="middle" fill="#E8FFE8" font-size="10">Controller 写 Store 后 Flush</text>
  <rect x="772" y="683" width="142" height="28" rx="14" fill="#FFFFFF" opacity="0.16"/>
  <text x="843" y="702" text-anchor="middle" fill="#E8FFE8" font-size="10">UIManager 唯一开关</text>
  <rect x="930" y="683" width="118" height="28" rx="14" fill="#FFFFFF" opacity="0.16"/>
  <text x="989" y="702" text-anchor="middle" fill="#E8FFE8" font-size="10">Signal 只进一次</text>
  <rect x="1064" y="683" width="76" height="28" rx="14" fill="#FFFFFF" opacity="0.16"/>
  <text x="1102" y="702" text-anchor="middle" fill="#E8FFE8" font-size="10">不读 Source</text>
</svg>
